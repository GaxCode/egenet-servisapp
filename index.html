<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Servis Bulucu</title>

  <meta name="theme-color" content="#000000">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <div id="servisSonuc"></div>

    <div id="girisEkrani">0</div>

    <div class="keypad">

      <button class="secondary" onclick="temizle()">C</button>
      <button class="secondary" onclick="sil()">⌫</button>
      <button class="empty"></button>

      <button onclick="ekle('1')">1</button>
      <button onclick="ekle('2')">2</button>
      <button onclick="ekle('3')">3</button>

      <button onclick="ekle('4')">4</button>
      <button onclick="ekle('5')">5</button>
      <button onclick="ekle('6')">6</button>

      <button onclick="ekle('7')">7</button>
      <button onclick="ekle('8')">8</button>
      <button onclick="ekle('9')">9</button>

      <button class="zero" onclick="ekle('0')">0</button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
